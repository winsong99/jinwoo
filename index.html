<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영어학원 일일 리포트 대시보드</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <span class="brand-mark">EN</span>
      <span class="brand-name">일일 리포트</span>
    </div>
    <nav class="nav">
      <button class="nav-item is-active" data-tab="dashboard">
        <svg viewBox="0 0 20 20" width="18" height="18"><path d="M3 10.5 10 4l7 6.5M5 9v7h10V9" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        대시보드
      </button>
      <button class="nav-item" data-tab="report-form">
        <svg viewBox="0 0 20 20" width="18" height="18"><path d="M6 3h6l3 3v11H6V3z" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linejoin="round"/><path d="M8 9h5M8 12h5M8 15h3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        리포트 작성
      </button>
      <button class="nav-item" data-tab="report-list">
        <svg viewBox="0 0 20 20" width="18" height="18"><rect x="3.5" y="4" width="13" height="12" rx="1.5" stroke="currentColor" stroke-width="1.6" fill="none"/><path d="M6.5 8h7M6.5 11h7M6.5 14h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        리포트 조회
      </button>
      <button class="nav-item" data-tab="students">
        <svg viewBox="0 0 20 20" width="18" height="18"><circle cx="10" cy="7" r="3" stroke="currentColor" stroke-width="1.6" fill="none"/><path d="M4 17c0-3 2.7-5 6-5s6 2 6 5" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round"/></svg>
        학생 관리
      </button>
    </nav>
    <div class="sidebar-foot">
      <button class="btn-ghost" id="export-btn">데이터 내보내기</button>
      <button class="btn-ghost" id="import-btn">데이터 가져오기</button>
      <input type="file" id="import-file" accept="application/json" hidden>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <h1 id="page-title">대시보드</h1>
      <div class="today" id="today-label"></div>
    </header>

    <!-- DASHBOARD -->
    <section class="panel is-active" id="panel-dashboard">
      <div class="stat-grid" id="stat-grid"></div>

      <div class="row-grid">
        <div class="card">
          <div class="card-head">
            <h2>최근 7일 리포트 작성 추이</h2>
          </div>
          <div id="trend-chart" class="chart-wrap"></div>
        </div>
        <div class="card">
          <div class="card-head">
            <h2>오늘 리포트 미작성 학생</h2>
            <span class="muted" id="missing-count"></span>
          </div>
          <div id="missing-list" class="missing-list"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-head">
          <h2>최근 작성된 리포트</h2>
        </div>
        <div class="table-wrap">
          <table class="table" id="recent-table">
            <thead>
              <tr><th>날짜</th><th>학생</th><th>출석</th><th>수업 태도</th><th>이해도</th><th>숙제</th><th>코멘트</th></tr>
            </thead>
            <tbody></tbody>
          </table>
          <p class="empty-msg" id="recent-empty" hidden>아직 작성된 리포트가 없습니다.</p>
        </div>
      </div>
    </section>

    <!-- REPORT FORM -->
    <section class="panel" id="panel-report-form">
      <div class="card form-card">
        <div class="card-head">
          <h2 id="report-form-title">일일 리포트 작성</h2>
        </div>
        <form id="report-form">
          <input type="hidden" id="report-id">
          <div class="field-grid">
            <label class="field">
              <span>학생 <em>*</em></span>
              <select id="f-student" required></select>
            </label>
            <label class="field">
              <span>날짜 <em>*</em></span>
              <input type="date" id="f-date" required>
            </label>
            <label class="field">
              <span>출석 여부 <em>*</em></span>
              <select id="f-attendance" required>
                <option value="출석">출석</option>
                <option value="지각">지각</option>
                <option value="조퇴">조퇴</option>
                <option value="결석">결석</option>
              </select>
            </label>
            <label class="field">
              <span>숙제 제출</span>
              <select id="f-homework">
                <option value="제출">제출</option>
                <option value="미제출">미제출</option>
                <option value="해당없음">해당없음</option>
              </select>
            </label>
            <label class="field">
              <span>수업 태도</span>
              <select id="f-attitude">
                <option value="매우좋음">매우 좋음</option>
                <option value="좋음">좋음</option>
                <option value="보통">보통</option>
                <option value="미흡">미흡</option>
              </select>
            </label>
            <label class="field">
              <span>이해도</span>
              <div class="star-input" id="f-understanding" data-value="3">
                <button type="button" data-star="1">★</button>
                <button type="button" data-star="2">★</button>
                <button type="button" data-star="3">★</button>
                <button type="button" data-star="4">★</button>
                <button type="button" data-star="5">★</button>
              </div>
            </label>
          </div>
          <label class="field field-block">
            <span>수업 진도 / 내용</span>
            <textarea id="f-progress" rows="2" placeholder="예: Unit 5 - 현재완료 시제, 리딩 지문 2개"></textarea>
          </label>
          <label class="field field-block">
            <span>강사 코멘트</span>
            <textarea id="f-comment" rows="3" placeholder="학부모님께 전달할 코멘트를 입력하세요"></textarea>
          </label>
          <div class="form-actions">
            <button type="button" class="btn-ghost" id="report-form-reset">초기화</button>
            <button type="submit" class="btn-primary">리포트 저장</button>
          </div>
        </form>
      </div>
    </section>

    <!-- REPORT LIST -->
    <section class="panel" id="panel-report-list">
      <div class="card">
        <div class="card-head filter-head">
          <h2>리포트 조회</h2>
          <div class="filters">
            <select id="filter-student"><option value="">전체 학생</option></select>
            <input type="date" id="filter-from">
            <span class="muted">~</span>
            <input type="date" id="filter-to">
            <button class="btn-ghost" id="filter-clear">필터 초기화</button>
          </div>
        </div>
        <div class="table-wrap">
          <table class="table" id="report-table">
            <thead>
              <tr><th>날짜</th><th>학생</th><th>출석</th><th>태도</th><th>이해도</th><th>숙제</th><th>진도</th><th>코멘트</th><th></th></tr>
            </thead>
            <tbody></tbody>
          </table>
          <p class="empty-msg" id="report-list-empty" hidden>조건에 맞는 리포트가 없습니다.</p>
        </div>
      </div>
    </section>

    <!-- STUDENTS -->
    <section class="panel" id="panel-students">
      <div class="row-grid row-grid-students">
        <div class="card form-card">
          <div class="card-head">
            <h2 id="student-form-title">학생 등록</h2>
          </div>
          <form id="student-form">
            <input type="hidden" id="s-id">
            <label class="field field-block">
              <span>이름 <em>*</em></span>
              <input type="text" id="s-name" required placeholder="예: 김민준">
            </label>
            <label class="field field-block">
              <span>반 / 레벨</span>
              <input type="text" id="s-class" placeholder="예: 중2 Reading A">
            </label>
            <label class="field field-block">
              <span>학생 연락처</span>
              <input type="text" id="s-phone" placeholder="010-0000-0000">
            </label>
            <label class="field field-block">
              <span>보호자 연락처</span>
              <input type="text" id="s-parent-phone" placeholder="010-0000-0000">
            </label>
            <label class="field field-block">
              <span>메모</span>
              <textarea id="s-memo" rows="2" placeholder="특이사항 등"></textarea>
            </label>
            <div class="form-actions">
              <button type="button" class="btn-ghost" id="student-form-reset">초기화</button>
              <button type="submit" class="btn-primary">학생 저장</button>
            </div>
          </form>
        </div>

        <div class="card">
          <div class="card-head">
            <h2>학생 목록</h2>
            <span class="muted" id="student-count"></span>
          </div>
          <div class="table-wrap">
            <table class="table" id="student-table">
              <thead>
                <tr><th>이름</th><th>반/레벨</th><th>연락처</th><th>보호자</th><th></th></tr>
              </thead>
              <tbody></tbody>
            </table>
            <p class="empty-msg" id="student-empty" hidden>등록된 학생이 없습니다. 왼쪽에서 학생을 추가해주세요.</p>
          </div>
        </div>
      </div>
    </section>
  </main>
</div>

<div class="toast" id="toast"></div>

<script src="js/storage.js"></script>
<script src="js/app.js"></script>
</body>
</html>
